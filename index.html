<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>ShopyGO | Offerte Amazon, Marketplace e Annunci Selezionati</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007185">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <script>
        let deferredPrompt;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js?v=2') // Aggiunta versione per forzare aggiornamento
                    .then(() => console.log("PWA: Service Worker Attivo"))
                    .catch((err) => console.log("PWA: Errore", err));
            });
        }

        // Cattura l'evento di installazione per mostrarlo quando vogliamo noi
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Mostra un piccolo avviso o il tasto installa se vuoi
            console.log("PWA: Pronto per l'installazione");
        });
    </script>

    <meta name="description" content="Scopri ShopyGO: la tua destinazione per le migliori offerte Amazon, sconti esclusivi e prodotti marketplace.">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #ffffff; --text: #131921; --amazon: #007185; --nuovo: #6c5ce7; --usato: #2ecc71; --offerta: #e67e22; --bg: #f3f3f3; --accent: #FFD814; --sconto: #CC0C39; }
        body { font-family: 'Segoe UI', system-ui; margin: 0; background: var(--bg); padding-bottom: 90px; color: var(--text); overflow-x: hidden; }
        
        /* HEADER */
        header { background: var(--primary); padding: 5px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; height: 60px; border-bottom: 1px solid #ddd; gap: 10px; }
        .logo { height: 30px; }
        .search-container { flex: 1; max-width: 600px; position: relative; display: flex; align-items: center; }
        .search-container input { width: 100%; padding: 10px 40px 10px 15px; border-radius: 25px; border: 1px solid #ccc; font-size: 14px; outline: none; }
        .search-container i { position: absolute; right: 15px; color: #888; }

        /* BANNER INSTALLAZIONE (Nuovo) */
        #pwa-install-banner {
            display: none;
            background: #232f3e;
            color: white;
            padding: 10px 15px;
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            z-index: 999;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border-bottom: 2px solid var(--accent);
        }
        #pwa-install-banner button {
            background: var(--accent);
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* SLIDER E GRIGLIA (Uguali a prima) */
        .slider-section { padding: 15px 0; background: #fff; margin-bottom: 10px; position: relative; }
        .slider-title { padding: 0 15px; margin: 0 0 10px 0; font-size: 1.1rem; font-weight: bold; color: var(--amazon); }
        .slider-wrapper { position: relative; display: flex; align-items: center; }
        .slider-container { display: flex; overflow-x: auto; scroll-behavior: smooth; gap: 15px; padding: 0 15px 10px 15px; scrollbar-width: none; }
        .slider-container::-webkit-scrollbar { display: none; }
        .slider-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .arrow-left { left: 5px; } .arrow-right { right: 5px; }
        .slider-item { min-width: 170px; max-width: 170px; background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 0; text-align: center; overflow: hidden; }
        .slider-item img { width: 100%; height: 120px; object-fit: cover; }
        .slider-item h5 { font-size: 0.8rem; margin: 8px; height: 32px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

        .main-layout { max-width: 1400px; margin: auto; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .card { background: white; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #ddd; position: relative; }
        .badge { position: absolute; top: 8px; padding: 3px 7px; border-radius: 4px; color: white; font-size: 8px; font-weight: bold; text-transform: uppercase; z-index: 5; }
        .badge-left { left: 8px; background: var(--amazon); }
        .badge-right { right: 8px; }
        .image-container { width: 100%; height: 180px; background: #fff; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
        .info h4 { font-size: 0.85rem; margin: 0; min-height: 60px; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; }
        .price-container { display: flex; flex-direction: column; margin: 8px 0 12px 0; }
        .price-row { display: flex; align-items: center; gap: 5px; }
        .perc-sconto { color: var(--sconto); font-size: 1.2rem; font-weight: 300; }
        .price { color: #131921; font-size: 1.2rem; font-weight: bold; }
        .old-price { color: #565959; text-decoration: line-through; font-size: 0.75rem; }
        .buy-btn { background: var(--accent); color: #000; padding: 8px; border-radius: 6px; text-decoration: none; font-size: 0.75rem; font-weight: bold; text-align: center; border: 1px solid #f0c14b; margin-top: auto; }

        /* LIGHTBOX E NAV (Uguali a prima) */
        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; }
        #lightbox img { max-width: 90%; max-height: 80%; border-radius: 8px; }
        .close-zoom { position: absolute; top: 20px; right: 20px; color: white; font-size: 2.5rem; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0 25px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 2000; border-radius: 20px 20px 0 0; }
        .nav-item { text-decoration: none; color: #555; font-size: 10px; text-align: center; flex: 1; border:none; background:none; }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--amazon); }

        /* DRAWER FILTRI */
        .filter-drawer { position: fixed; bottom: -100%; left: 0; right: 0; background: white; z-index: 3000; border-radius: 25px 25px 0 0; transition: 0.4s; padding: 20px 25px 40px 25px; max-height: 85vh; overflow-y: auto; }
        .filter-drawer.open { bottom: 0; }
        .filter-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 2500; display: none; backdrop-filter: blur(2px); }
    </style>
</head>
<body>

    <div id="pwa-install-banner">
        <span>Installa ShopyGO sul tuo telefono</span>
        <button onclick="installaPWA()">INSTALLA</button>
    </div>

    <div id="lightbox">
        <span class="close-zoom">&times;</span>
        <img id="img-zoom" src="">
    </div>

    <header>
        <img src="logo.png" alt="ShopyGO" class="logo">
        <div class="search-container">
            <input type="text" id="main-search" placeholder="Cerca nello shop..." autocomplete="off">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </header>

    <div class="slider-section" id="section-novita">
        <p class="slider-title"><i class="fa-solid fa-fire"></i> Ultime Novità</p>
        <div class="slider-wrapper">
            <div class="slider-arrow arrow-left" onclick="scrollSlider(-200)"><i class="fa-solid fa-chevron-left"></i></div>
            <div class="slider-container" id="slider-prodotti"></div>
            <div class="slider-arrow arrow-right" onclick="scrollSlider(200)"><i class="fa-solid fa-chevron-right"></i></div>
        </div>
    </div>

    <div class="main-layout">
        <div id="product-grid" class="grid"></div>
    </div>

    <div class="filter-overlay" id="overlay"></div>
    <div class="filter-drawer" id="drawer">
        <div style="width:40px; height:5px; background:#e0e0e0; border-radius:10px; margin: -5px auto 15px auto;"></div>
        <div class="filter-group">
            <h3>Prezzo</h3>
            <div style="display:flex; gap:10px;">
                <input type="number" id="min-price" placeholder="Min" style="width:100%; padding:8px;">
                <input type="number" id="max-price" placeholder="Max" style="width:100%; padding:8px;">
            </div>
        </div>
        <div class="filter-group">
            <h3>Condizione</h3>
            <div id="status-list"></div>
        </div>
        <div class="filter-group">
            <h3>Piattaforme</h3>
            <div id="type-list"></div>
        </div>
        <div class="filter-group">
            <h3>Categorie</h3>
            <div id="category-list"></div>
        </div>
        <button id="close-filters" style="width:100%; background:var(--amazon); color:white; border:none; padding:15px; border-radius:10px; margin-top:20px; font-weight:bold;">APPLICA</button>
    </div>

    <nav class="nav-bottom">
        <a href="index.html" class="nav-item active"><i class="fa-solid fa-house"></i><span>Shop</span></a>
        <div class="nav-item" id="open-filters" style="cursor:pointer;"><i class="fa-solid fa-bars-staggered"></i><span>Filtri</span></div>
        <a href="staff.html" class="nav-item"><i class="fa-solid fa-circle-plus"></i><span>Staff</span></a>
        <a href="admin-master.html" class="nav-item"><i class="fa-solid fa-chart-simple"></i><span>Admin</span></a>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDRv3qN2qRd2rVKlTB8YDHpyhrDgRiX7vc", authDomain: "shopygo-database.firebaseapp.com", projectId: "shopygo-database", storageBucket: "shopygo-database.firebasestorage.app", messagingSenderId: "336849306481", appId: "1:336849306481:web:aef142b389ef778ba3ecd0" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let tuttiProdotti = [];

    // Gestione Installazione PWA
    window.installaPWA = async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            document.getElementById('pwa-install-banner').style.display = 'none';
        }
        deferredPrompt = null;
    };

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // Se siamo su mobile e non è installato, mostriamo il banner dopo 3 secondi
        setTimeout(() => {
            document.getElementById('pwa-install-banner').style.display = 'flex';
        }, 3000);
    });

    // Funzioni Core
    window.registraClick = async (productId) => {
        try { await updateDoc(doc(db, "prodotti", productId), { click_count: increment(1) }); } catch (e) {}
    };

    window.apriZoom = (url) => {
        document.getElementById('img-zoom').src = url;
        document.getElementById('lightbox').style.display = 'flex';
    };

    document.querySelector('.close-zoom').onclick = () => document.getElementById('lightbox').style.display = 'none';
    
    window.scrollSlider = (amt) => {
        document.getElementById('slider-prodotti').scrollBy({ left: amt, behavior: 'smooth' });
    };

    // Gestione Filtri
    const drawer = document.getElementById('drawer');
    const overlay = document.getElementById('overlay');
    document.getElementById('open-filters').onclick = () => { drawer.classList.add('open'); overlay.style.display = 'block'; };
    const chiudiFiltri = () => { drawer.classList.remove('open'); overlay.style.display = 'none'; };
    document.getElementById('close-filters').onclick = chiudiFiltri;
    overlay.onclick = chiudiFiltri;

    async function carica() {
        const confSnap = await getDocs(collection(db, "app_config"));
        const containers = { categorie: 'category-list', piattaforme: 'type-list', stato: 'status-list' };
        confSnap.forEach(d => {
            const data = d.data();
            const cont = document.getElementById(containers[data.tipo]);
            if(cont) {
                const label = document.createElement('label');
                label.style.display = "block";
                label.innerHTML = `<input type="checkbox" class="f-check" data-tipo="${data.tipo}" value="${data.nome}"> ${data.nome}`;
                cont.appendChild(label);
            }
        });

        const snap = await getDocs(collection(db, "prodotti"));
        tuttiProdotti = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        tuttiProdotti.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
        
        renderTutto();
        document.querySelectorAll('.f-check, #min-price, #max-price, #main-search').forEach(el => {
            el.addEventListener('input', renderTutto);
        });
    }

    function renderTutto() {
        const search = document.getElementById('main-search').value.toLowerCase();
        const min = parseFloat(document.getElementById('min-price').value) || 0;
        const max = parseFloat(document.getElementById('max-price').value) || 999999;
        
        const filtriAttivi = {
            categorie: Array.from(document.querySelectorAll('.f-check[data-tipo="categorie"]:checked')).map(c => c.value),
            piattaforme: Array.from(document.querySelectorAll('.f-check[data-tipo="piattaforme"]:checked')).map(c => c.value),
            stato: Array.from(document.querySelectorAll('.f-check[data-tipo="stato"]:checked')).map(c => c.value)
        };

        const filtrati = tuttiProdotti.filter(p => {
            const pPrezzo = parseFloat(p.prezzo?.toString().replace(',', '.') || 0);
            return p.titolo.toLowerCase().includes(search) &&
                   pPrezzo >= min && pPrezzo <= max &&
                   (filtriAttivi.categorie.length === 0 || filtriAttivi.categorie.includes(p.categoria)) &&
                   (filtriAttivi.piattaforme.length === 0 || filtriAttivi.piattaforme.includes(p.tipo)) &&
                   (filtriAttivi.stato.length === 0 || filtriAttivi.stato.includes(p.stato));
        });

        // Render Slider (Ultime 8 novità)
        const slider = document.getElementById('slider-prodotti');
        slider.innerHTML = "";
        tuttiProdotti.slice(0, 8).forEach(p => {
            const div = document.createElement('div');
            div.className = 'slider-item';
            div.innerHTML = `<img src="${p.immagine}" onclick="apriZoom('${p.immagine}')"><h5>${p.titolo}</h5>`;
            slider.appendChild(div);
        });

        // Render Grid
        const grid = document.getElementById('product-grid');
        grid.innerHTML = "";
        filtrati.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            let sCol = p.stato === "Nuovo" ? "var(--nuovo)" : (p.stato === "Usato" ? "var(--usato)" : "var(--offerta)");
            card.innerHTML = `
                <div class="badge badge-left">${p.tipo || 'Amazon'}</div>
                <div class="badge badge-right" style="background:${sCol}; right:8px;">${p.stato || ''}</div>
                <div class="image-container" onclick="apriZoom('${p.immagine}')"><img src="${p.immagine}"></div>
                <div class="info">
                    <h4>${p.titolo}</h4>
                    <div class="price-row"><span class="price">€${p.prezzo}</span></div>
                    <a href="${p.link_amazon || p.link}" target="_blank" class="buy-btn" onclick="registraClick('${p.id}')">VEDI OFFERTA</a>
                </div>`;
            grid.appendChild(card);
        });
    }

    carica();
</script>
</body>
</html>
