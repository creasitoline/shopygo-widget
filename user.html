<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShopyGO - Shop Personale</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ffffff; --text: #131921; --amazon: #007185; --bg: #f3f3f3; --accent: #FFD814; --success: #2ecc71; --danger: #cc0000; }
        body { font-family: 'Segoe UI', system-ui; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 50px; }
        header { background: var(--primary); padding: 10px 20px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #ddd; }
        .logo { height: 35px; }
        
        .hero-user { background: white; padding: 30px 20px; text-align: center; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .user-badge { background: var(--amazon); color: white; padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }

        /* Griglia Mobile a 2 colonne */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            padding: 10px; 
            max-width: 1200px; 
            margin: auto; 
        }

        .card-p { 
            background: white; 
            padding: 10px; 
            border-radius: 12px; 
            text-align: center; 
            border: 1px solid #eee; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            text-decoration: none; 
            color: inherit;
            height: 100%;
        }

        /* Badge Percentuale Sconto */
        .discount-badge { 
            position: absolute; 
            top: 5px; 
            left: 5px; 
            background: var(--danger); 
            color: white; 
            padding: 2px 6px; 
            border-radius: 5px; 
            font-size: 11px; 
            font-weight: bold; 
            z-index: 5;
        }

        .card-p img { width: 100%; height: 110px; object-fit: contain; margin-bottom: 8px; }
        .card-p h3 { font-size: 12px; margin: 5px 0; height: 34px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: #333; line-height: 1.3; }
        
        .price-box { margin-top: auto; }
        .old-price { font-size: 11px; color: #888; text-decoration: line-through; display: block; height: 14px; }
        .price { font-size: 16px; font-weight: bold; color: var(--text); display: block; margin-bottom: 5px; }
        
        /* Bottoni dinamici */
        .btn-buy { border: none; padding: 8px; border-radius: 6px; font-weight: bold; font-size: 11px; width: 100%; cursor: pointer; text-transform: uppercase; }
        .btn-amazon { background: var(--accent); color: #111; }
        .btn-contact { background: var(--success); color: white; }

        #no-products { text-align: center; padding: 50px; color: #777; font-weight: 500; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--amazon); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="ShopyGO" class="logo">
    </header>

    <div class="hero-user">
        <span class="user-badge">SHOP PERSONALE</span>
        <h2 style="margin: 10px 0 5px 0;">Offerte Selezionate</h2>
        <p style="font-size: 13px; color: #666; margin: 0;">Prodotti scelti e verificati dal nostro staff.</p>
    </div>

    <div id="loader" class="loader"></div>
    <div id="grid-prodotti" class="grid"></div>
    
    <div id="no-products" class="hidden">
        <i class="fa-solid fa-box-open" style="font-size: 3rem; color: #ccc; margin-bottom: 15px; display: block;"></i>
        Nessun prodotto disponibile al momento.
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDRv3qN2qRd2rVKlTB8YDHpyhrDgRiX7vc", 
        authDomain: "shopygo-database.firebaseapp.com", 
        projectId: "shopygo-database", 
        storageBucket: "shopygo-database.firebasestorage.app", 
        messagingSenderId: "336849306481", 
        appId: "1:336849306481:web:aef142b389ef778ba3ecd0" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    const trackingTag = urlParams.get('tag');

    if (!trackingTag) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('no-products').innerHTML = "Link non valido.";
        document.getElementById('no-products').classList.remove('hidden');
    } else {
        caricaProdottiPerTag(trackingTag);
    }

    async function caricaProdottiPerTag(tag) {
        const container = document.getElementById('grid-prodotti');
        try {
            const q = query(collection(db, "prodotti"), where("tag", "==", tag));
            const snap = await getDocs(q);
            
            document.getElementById('loader').style.display = 'none';

            if (snap.empty) {
                document.getElementById('no-products').classList.remove('hidden');
                return;
            }

            snap.forEach((res) => {
                const p = res.data();
                const productID = res.id;
                
                // Calcolo Percentuale Sconto
                let scontoHTML = '';
                if(p.prezzo_pieno && parseFloat(p.prezzo_pieno) > parseFloat(p.prezzo)) {
                    const perc = Math.round(((p.prezzo_pieno - p.prezzo) / p.prezzo_pieno) * 100);
                    scontoHTML = `<div class="discount-badge">-${perc}%</div>`;
                }

                // Logica Tasto Dinamico
                const isAmazon = (p.tipo && p.tipo.toLowerCase() === 'amazon') || p.link_amazon.includes('amazon');
                const btnClass = isAmazon ? 'btn-amazon' : 'btn-contact';
                const btnText = isAmazon ? 'Vedi su Amazon' : 'Contatta Ora';

                const card = document.createElement('a');
                card.className = 'card-p';
                card.href = p.link_amazon;
                card.target = "_blank";
                
                card.onclick = () => {
                    updateDoc(doc(db, "prodotti", productID), { click_count: increment(1) });
                };

                card.innerHTML = `
                    ${scontoHTML}
                    <img src="${p.immagine || 'placeholder.jpg'}" alt="Prodotto">
                    <h3>${p.titolo}</h3>
                    <div class="price-box">
                        <span class="old-price">${p.prezzo_pieno ? p.valuta + ' ' + p.prezzo_pieno : ''}</span>
                        <span class="price">${p.valuta || '€'} ${p.prezzo}</span>
                        <button class="btn-buy ${btnClass}">${btnText}</button>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (error) {
            console.error("Errore:", error);
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
