<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShopyGO | Shop Personale Selezionato</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ffffff; --text: #131921; --amazon: #007185; --nuovo: #6c5ce7; --usato: #2ecc71; --offerta: #e67e22; --bg: #f3f3f3; --accent: #FFD814; --sconto: #CC0C39; }
        body { font-family: 'Segoe UI', system-ui; margin: 0; background: var(--bg); padding-bottom: 90px; color: var(--text); overflow-x: hidden; }
        
        header { background: var(--primary); padding: 5px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; height: 60px; border-bottom: 1px solid #ddd; gap: 10px; }
        .logo { height: 30px; cursor: pointer; }
        
        .hero-user { background: white; padding: 20px 15px; text-align: center; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .user-badge { background: var(--amazon); color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }

        .search-container { flex: 1; max-width: 600px; position: relative; display: flex; align-items: center; }
        .search-container input { width: 100%; padding: 10px 40px 10px 15px; border-radius: 25px; border: 1px solid #ccc; font-size: 14px; outline: none; }
        .search-container i { position: absolute; right: 15px; color: #888; }

        .main-layout { max-width: 1400px; margin: auto; padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        
        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 5px; }
        }

        .card { background: white; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #ddd; position: relative; }
        .badge { position: absolute; top: 8px; padding: 3px 7px; border-radius: 4px; color: white; font-size: 8px; font-weight: bold; text-transform: uppercase; z-index: 5; }
        .badge-left { left: 8px; background: var(--amazon); }
        .badge-right { right: 8px; background: #666; }

        .image-container { width: 100%; height: 160px; background: #fff; cursor: zoom-in; }
        .card img { width: 100%; height: 100%; object-fit: contain; }
        
        .info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
        .info h4 { font-size: 0.85rem; margin: 0; min-height: 50px; line-height: 1.2; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        
        .price-container { display: flex; flex-direction: column; margin: 8px 0 12px 0; }
        .price-row { display: flex; align-items: center; gap: 5px; }
        .perc-sconto { color: var(--sconto); font-size: 1.1rem; font-weight: 400; }
        .price { color: #131921; font-size: 1.1rem; font-weight: bold; }
        .old-price { color: #565959; text-decoration: line-through; font-size: 0.75rem; margin-top: -2px; }
        .single-price { color: #131921; font-size: 1.1rem; font-weight: bold; margin: 8px 0 12px 0; display: block; }

        .buy-btn { padding: 8px; border-radius: 6px; text-decoration: none; font-size: 0.75rem; font-weight: bold; text-align: center; margin-top: auto; border: 1px solid transparent; }

        /* Navigazione Bottom */
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0 25px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 2000; border-radius: 20px 20px 0 0; }
        .nav-item { text-decoration: none; color: #555; font-size: 10px; text-align: center; flex: 1; border:none; background:none; cursor:pointer; }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; display: block; }
        .nav-item.active { color: var(--amazon); }

        #lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; align-items: center; justify-content: center; }
        #lightbox img { max-width: 90%; max-height: 80%; border-radius: 8px; }
        .close-zoom { position: absolute; top: 20px; right: 20px; color: white; font-size: 2.5rem; cursor: pointer; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--amazon); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="lightbox">
        <span class="close-zoom">&times;</span>
        <img id="img-zoom" src="">
    </div>

    <header>
        <a href="index.html"><img src="logo.png" alt="ShopyGO" class="logo"></a>
        <div class="search-container">
            <input type="text" id="user-search" placeholder="Cerca tra i miei consigli..." autocomplete="off">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </header>

    <div class="hero-user">
        <span class="user-badge">SHOP PERSONALE</span>
        <h2 style="margin: 8px 0 3px 0; font-size: 1.3rem;">Offerte Selezionate</h2>
        <p style="font-size: 12px; color: #666; margin: 0;">Le migliori occasioni scelte per te.</p>
    </div>

    <div id="loader" class="loader"></div>

    <div class="main-layout">
        <div id="product-grid" class="grid"></div>
        <div id="no-products" class="hidden" style="text-align: center; padding: 40px; color: #888;">
            <i class="fa-solid fa-box-open" style="font-size: 3rem; margin-bottom: 10px; display: block;"></i>
            Nessun prodotto trovato.
        </div>
    </div>

    <nav class="nav-bottom">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <div class="nav-item active"><i class="fa-solid fa- star"></i><span>I miei consigli</span></div>
        <a href="staff.html" class="nav-item"><i class="fa-solid fa-circle-plus"></i><span>Staff</span></a>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyDRv3qN2qRd2rVKlTB8YDHpyhrDgRiX7vc", 
        authDomain: "shopygo-database.firebaseapp.com", 
        projectId: "shopygo-database", 
        storageBucket: "shopygo-database.firebasestorage.app", 
        messagingSenderId: "336849306481", 
        appId: "1:336849306481:web:aef142b389ef778ba3ecd0" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let prodottiCaricati = [];
    const urlParams = new URLSearchParams(window.location.search);
    const trackingTag = urlParams.get('tag');

    window.registraClick = async (productId) => {
        const prodRef = doc(db, "prodotti", productId);
        try { await updateDoc(prodRef, { click_count: increment(1) }); } catch (e) { console.error(e); }
    };

    window.apriZoom = (url) => {
        document.getElementById('img-zoom').src = url;
        document.getElementById('lightbox').style.display = 'flex';
    };

    document.querySelector('.close-zoom').onclick = () => document.getElementById('lightbox').style.display = 'none';

    async function caricaProdotti() {
        if (!trackingTag) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('no-products').innerHTML = "Link non valido.";
            document.getElementById('no-products').classList.remove('hidden');
            return;
        }

        try {
            const q = query(collection(db, "prodotti"), where("tag", "==", trackingTag));
            const snap = await getDocs(q);
            document.getElementById('loader').classList.add('hidden');

            if (snap.empty) {
                document.getElementById('no-products').classList.remove('hidden');
                return;
            }

            prodottiCaricati = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderGrid();
        } catch (e) {
            console.error(e);
            document.getElementById('loader').classList.add('hidden');
        }
    }

    function renderGrid() {
        const grid = document.getElementById('product-grid');
        const searchTerm = document.getElementById('user-search').value.toLowerCase();
        
        const filtrati = prodottiCaricati.filter(p => 
            p.visibile !== false && p.titolo.toLowerCase().includes(searchTerm)
        );

        grid.innerHTML = "";
        
        if(filtrati.length === 0) {
            document.getElementById('no-products').classList.remove('hidden');
        } else {
            document.getElementById('no-products').classList.add('hidden');
        }

        filtrati.forEach(p => {
            let sCol = (p.stato || "").toLowerCase() === "nuovo" ? "var(--nuovo)" : ((p.stato || "").toLowerCase() === "usato" ? "var(--usato)" : "var(--offerta)");
            
            const isMarketplace = (p.tipo === "Marketplace" || p.tipo === "Annunci");
            const btnText = isMarketplace ? "CONTATTA ORA" : "VEDI OFFERTA";
            const btnCol = isMarketplace ? "#2ecc71" : "var(--accent)";
            const btnLink = p.link_amazon || p.link || "#";

            let htmlPrezzo = "";
            const prScontato = parseFloat(p.prezzo?.toString().replace(',', '.') || 0);
            const prPieno = parseFloat(p.prezzo_pieno?.toString().replace(',', '.') || 0);

            if (prPieno > prScontato && prScontato > 0) {
                const perc = p.sconto_perc || Math.round(((prPieno - prScontato) / prPieno) * 100) + '%';
                htmlPrezzo = `
                    <div class="price-container">
                        <div class="price-row">
                            <span class="perc-sconto">-${perc}</span>
                            <span class="price">${p.valuta || '€'}${p.prezzo}</span>
                        </div>
                        <span class="old-price">Prezzo: ${p.valuta || '€'}${p.prezzo_pieno}</span>
                    </div>`;
            } else {
                htmlPrezzo = `<span class="single-price">${p.valuta || '€'} ${p.prezzo}</span>`;
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="badge badge-left">${p.tipo || 'Amazon'}</div>
                ${p.stato ? `<div class="badge badge-right" style="background:${sCol}">${p.stato}</div>` : ''}
                <div class="image-container" onclick="window.apriZoom('${p.immagine}')">
                    <img src="${p.immagine || 'placeholder.jpg'}">
                </div>
                <div class="info">
                    <h4>${p.titolo}</h4>
                    ${htmlPrezzo}
                    <a href="${btnLink}" target="_blank" class="buy-btn" 
                       onclick="window.registraClick('${p.id}')" 
                       style="background:${btnCol}; color: ${isMarketplace ? 'white' : 'black'}; border-color:${isMarketplace ? '#27ae60' : '#f0c14b'}">${btnText}</a>
                </div>`;
            grid.appendChild(card);
        });
    }

    document.getElementById('user-search').oninput = renderGrid;
    caricaProdotti();
</script>
</body>
</html>
