<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShopyGO - Shop Personale</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ffffff; --text: #131921; --amazon: #007185; --bg: #f3f3f3; --accent: #FFD814; }
        body { font-family: 'Segoe UI', system-ui; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 50px; }
        header { background: var(--primary); padding: 10px 20px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #ddd; }
        .logo { height: 35px; }
        .hero-user { background: white; padding: 30px 20px; text-align: center; border-bottom: 1px solid #eee; margin-bottom: 20px; }
        .user-badge { background: var(--amazon); color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; max-width: 1200px; margin: auto; }
        .card-p { background: white; padding: 12px; border-radius: 15px; text-align: center; border: 1px solid #eee; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; height: 280px; text-decoration: none; color: inherit; }
        .card-p:active { transform: scale(0.98); }
        .card-p img { width: 100%; height: 120px; object-fit: contain; margin-bottom: 10px; }
        .card-p h3 { font-size: 13px; margin: 5px 0; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: #333; }
        .price-box { margin-top: auto; }
        .price { font-size: 18px; font-weight: bold; color: var(--text); }
        .old-price { font-size: 12px; color: #888; text-decoration: line-through; margin-right: 5px; }
        .btn-buy { background: var(--accent); color: #111; border: none; padding: 8px; border-radius: 8px; font-weight: bold; margin-top: 10px; font-size: 12px; }
        #no-products { text-align: center; padding: 50px; color: #777; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--amazon); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="ShopyGO" class="logo">
    </header>

    <div class="hero-user">
        <span class="user-badge" id="user-tag-display">SHOP PERSONALE</span>
        <h2 id="welcome-msg" style="margin: 10px 0 5px 0;">Le mie offerte selezionate</h2>
        <p style="font-size: 13px; color: #666; margin: 0;">Risparmia con i prodotti che ho scelto per te!</p>
    </div>

    <div id="loader" class="loader"></div>
    <div id="grid-prodotti" class="grid"></div>
    <div id="no-products" class="hidden">Non ci sono ancora prodotti in questo shop.</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDRv3qN2qRd2rVKlTB8YDHpyhrDgRiX7vc", authDomain: "shopygo-database.firebaseapp.com", projectId: "shopygo-database", storageBucket: "shopygo-database.firebasestorage.app", messagingSenderId: "336849306481", appId: "1:336849306481:web:aef142b389ef778ba3ecd0" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 1. Recupera l'ID dall'URL (es. user.html?id=SG002)
    const urlParams = new URLSearchParams(window.location.search);
    const userID = urlParams.get('id')?.toUpperCase();

    if (!userID) {
        document.getElementById('welcome-msg').innerText = "Shop non trovato";
        document.getElementById('loader').style.display = 'none';
    } else {
        document.getElementById('user-tag-display').innerText = "SHOP: " + userID;
        caricaProdottiUtente(userID);
    }

    async function caricaProdottiUtente(tag) {
        const container = document.getElementById('grid-prodotti');
        try {
            // Cerchiamo nel database i prodotti che hanno quel TAG
            const q = query(collection(db, "prodotti"), where("tag", "==", tag));
            const snap = await getDocs(q);
            
            document.getElementById('loader').style.display = 'none';

            if (snap.empty) {
                document.getElementById('no-products').style.display = 'block';
                return;
            }

            snap.forEach((res) => {
                const p = res.data();
                const productID = res.id;
                
                const card = document.createElement('a');
                card.className = 'card-p';
                card.href = p.link_amazon;
                card.target = "_blank";
                
                // Tracciamento click quando l'utente apre il prodotto
                card.onclick = () => {
                    updateDoc(doc(db, "prodotti", productID), {
                        click_count: increment(1)
                    });
                };

                card.innerHTML = `
                    <img src="${p.immagine || 'placeholder.jpg'}" alt="Prodotto">
                    <h3>${p.titolo}</h3>
                    <div class="price-box">
                        ${p.prezzo_pieno ? `<span class="old-price">${p.valuta || '€'} ${p.prezzo_pieno}</span>` : ''}
                        <span class="price">${p.valuta || '€'} ${p.prezzo}</span>
                        <button class="btn-buy">VEDI OFFERTA</button>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (error) {
            console.error("Errore caricamento:", error);
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
