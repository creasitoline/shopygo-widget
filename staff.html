<div class="stats-bar" style="display: flex; gap: 10px; margin-bottom: 20px;">
    <div style="flex: 1; background: white; padding: 10px; border-radius: 12px; border: 1px solid #ddd; text-align: center;">
        <small style="display: block; font-size: 10px; color: #777;">Annunci</small>
        <b id="stat-annunci" style="color: var(--amazon);">0 / 0</b>
    </div>
    <div style="flex: 1; background: white; padding: 10px; border-radius: 12px; border: 1px solid #ddd; text-align: center;">
        <small style="display: block; font-size: 10px; color: #777;">Click Totali</small>
        <b id="stat-click" style="color: var(--amazon);">0 / 0</b>
    </div>
</div>

<div id="modal-premium" class="modal hidden">
    <div class="modal-box" style="text-align: center;">
        <i class="fa-solid fa-crown" style="font-size: 3rem; color: var(--accent); margin-bottom: 15px;"></i>
        <h2 style="margin: 0;">Limite Raggiunto!</h2>
        <p id="premium-msg" style="color: #666; font-size: 14px; margin: 15px 0;">Hai esaurito i caricamenti disponibili per il tuo piano.</p>
        <button style="background: linear-gradient(to right, #FFD814, #ff9900); color: #131921; border: none; padding: 15px;">PASSA A PREMIUM</button>
        <button onclick="document.getElementById('modal-premium').classList.add('hidden')" style="background: none; color: #777; margin-top: 10px; border: none;">Più tardi</button>
    </div>
</div>
