<style>
    /* ... i tuoi stili precedenti ... */

    /* Nuovo Stile Popup Premium */
    .premium-modal {
        background: linear-gradient(145deg, #ffffff, #f0f0f0);
        padding: 30px;
        border-radius: 30px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        border: 2px solid #FFD814;
    }
    .premium-icon {
        font-size: 50px;
        background: linear-gradient(to bottom, #FFD814, #ff9900);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 20px;
    }
    .btn-premium {
        background: linear-gradient(90deg, #131921, #37475a);
        color: #FFD814;
        border: 2px solid #FFD814;
        padding: 15px 30px;
        border-radius: 50px;
        font-weight: bold;
        margin-top: 20px;
        cursor: pointer;
        display: inline-block;
        text-decoration: none;
    }
    .blur-bg { filter: blur(5px); pointer-events: none; user-select: none; }
</style>

<div id="modal-premium" class="modal hidden">
    <div class="premium-modal">
        <i class="fa-solid fa-crown premium-icon"></i>
        <h2 style="margin:0">Limite Raggiunto</h2>
        <p style="color:#666; margin: 15px 0;">Hai raggiunto il massimo di prodotti caricabili per il tuo piano attuale.</p>
        <div style="background: #fff9db; padding: 15px; border-radius: 15px; border: 1px dashed #FFD814;">
            <small>Passa a <b>ShopyGO Premium</b> per caricamenti illimitati e statistiche avanzate.</small>
        </div>
        <a href="https://wa.me/tuonumero" class="btn-premium">SCOPRI PREMIUM</a>
        <br>
        <button onclick="document.getElementById('modal-premium').classList.add('hidden')" style="background:none; border:none; color:#999; margin-top:15px; font-size:12px;">Magari più tardi</button>
    </div>
</div>

<script type="module">
    // Aggiungi onSnapshot agli import
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, updateDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ... config e init ...
    const db = getFirestore(app);
    let utenteAttivo = null;
    let unsubUtente = null; // Per pulire il listener se serve

    // MODIFICA: Funzione Login con Listener in tempo reale
    async function aggiornaDatiUtente(codice) {
        const q = query(collection(db, "utenti_abilitati"), where("codice", "==", codice));
        
        // Ascolta i cambiamenti dell'admin in tempo reale
        unsubUtente = onSnapshot(q, (snap) => {
            if(!snap.empty) {
                utenteAttivo = snap.docs[0].data();
                utenteAttivo.idDoc = snap.docs[0].id;
                localStorage.setItem('shopygo_user_session', codice);
                mostraDashboard();
            } else {
                alert("Accesso revocato o ID errato.");
                logout();
            }
        });
    }

    async function mostraDashboard() {
        // Conta annunci (sempre aggiornato)
        const qP = query(collection(db, "prodotti"), where("tag", "==", utenteAttivo.tag));
        const snapP = await getDocs(qP);
        const annunciCount = snapP.size;

        document.getElementById('nome-utente').innerText = "Ciao, " + utenteAttivo.nome;
        document.getElementById('id-display').innerText = "ID Staff: " + utenteAttivo.codice;
        document.getElementById('wallet-importo').innerText = "€ " + (parseFloat(utenteAttivo.guadagno_lordo || 0)).toFixed(2);
        
        const statusDiv = document.getElementById('wallet-status');
        statusDiv.innerHTML = utenteAttivo.pagato ? 
            '<span class="status-badge status-paid">Pagato</span>' : 
            '<span class="status-badge status-pending">In Attesa</span>';
        
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('main-container').classList.remove('hidden');

        // LOGICA LIMITI MIGLIORATA
        const isOverLimit = (utenteAttivo.limite_annunci && annunciCount >= utenteAttivo.limite_annunci) || 
                           (utenteAttivo.limite_click && utenteAttivo.click_attuali >= utenteAttivo.limite_click);

        const btnVerifica = document.getElementById('btn-verifica');
        
        if(isOverLimit) {
            btnVerifica.innerHTML = '<i class="fa-solid fa-lock"></i> LIMITE RAGGIUNTO';
            btnVerifica.style.background = "#ccc";
            btnVerifica.onclick = () => {
                document.getElementById('modal-premium').classList.remove('hidden');
            };
        } else {
            btnVerifica.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> VERIFICA E CARICA';
            btnVerifica.style.background = "var(--amazon)";
            // Ripristina funzione originale
            btnVerifica.onclick = avviaVerifica; 
        }

        caricaConfigurazioni();
        caricaProdotti();
    }

    // Isola la funzione di verifica per riassegnarla
    function avviaVerifica() {
        const urlRaw = document.getElementById('amazon-link').value;
        if(!urlRaw) return;
        
        // ... tua logica fetch linkpreview ...
        fetch('https://api.linkpreview.net', { method: 'POST', body: JSON.stringify({key: "3e6cf56ee1f4b99fa9b495166bd732c0", q: urlRaw}) })
        .then(r => r.json()).then(res => {
            document.getElementById('f-titolo').value = res.title || ""; 
            document.getElementById('f-img').value = res.image || "";
            const asinMatch = urlRaw.match(/(?:\/dp\/|\/gp\/product\/)([A-Z0-9]{10})/i);
            document.getElementById('f-link').value = asinMatch ? `https://www.amazon.it/dp/${asinMatch[1]}?tag=${utenteAttivo.tag}` : urlRaw;
            document.getElementById('modal-form').classList.remove('hidden');
        });
    }

    function logout() {
        if(unsubUtente) unsubUtente();
        localStorage.removeItem('shopygo_user_session');
        location.reload();
    }
    
    document.getElementById('btn-logout').onclick = logout;
    // ... resto del codice per salvataggio e config ...
</script>
