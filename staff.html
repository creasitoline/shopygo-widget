<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShopyGO - Staff Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ffffff; --text: #131921; --amazon: #007185; --nuovo: #6c5ce7; --bg: #f3f3f3; --accent: #FFD814; --danger: #ff4757; --success: #28a745; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--text); }
        
        header { background: var(--primary); padding: 5px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; height: 60px; border-bottom: 1px solid #ddd; }
        .logo { height: 30px; }

        .main-layout { max-width: 900px; margin: auto; padding: 15px; }
        
        /* Dashboard Cards */
        .user-info-bar { background: white; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid #ddd; }
        .wallet-card { background: linear-gradient(135deg, #007185, #004e5d); color: white; padding: 20px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,113,133,0.3); }
        .wallet-info p { margin: 5px 0 0 0; font-size: 1.6rem; font-weight: bold; }

        /* Counter Bar */
        .stats-bar { background: #fff; padding: 10px 15px; border-radius: 12px; display: flex; gap: 10px; margin-bottom: 20px; border: 1px solid #ddd; font-size: 12px; }
        .stat-item { flex: 1; text-align: center; border-right: 1px solid #eee; }
        .stat-item:last-child { border: 0; }
        .stat-item b { display: block; color: var(--amazon); font-size: 14px; }

        /* Grid e Card */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card-p { background: white; padding: 8px; border-radius: 12px; text-align: center; border: 1px solid #eee; position: relative; height: 165px; display: flex; flex-direction: column; overflow: hidden; }
        .card-p img { width: 100%; height: 85px; object-fit: contain; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: var(--danger); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; z-index: 5; }
        
        /* Modali */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 3000; padding: 15px; }
        .modal-box { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 450px; position: relative; }
        .hidden { display: none !important; }

        /* Form Stying */
        .input-group-custom { display: flex; gap: 5px; align-items: center; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; }
        button { background: var(--amazon); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-plus { width: 45px; background: var(--success); height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .btn-trash { width: 45px; background: var(--danger); height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }

        /* Premium PopUp */
        .premium-box { text-align: center; }
        .premium-box i { font-size: 4rem; color: var(--accent); margin-bottom: 15px; }
        .btn-premium { background: linear-gradient(to right, #FFD814, #ff9900); color: #000; margin-top: 15px; }

        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0 25px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); border-radius: 20px 20px 0 0; }
        .nav-item { text-decoration: none; color: #555; font-size: 10px; text-align: center; flex: 1; }
        .nav-item.active { color: var(--amazon); }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="ShopyGO" class="logo">
    <span style="font-weight: bold; font-size: 0.8rem; color: var(--amazon);">CONSOLE STAFF</span>
</header>

<div id="main-container">
    <div class="main-layout">
        <div class="user-info-bar">
            <div><b id="nome-utente">Caricamento...</b><br><small id="id-display"></small></div>
            <button style="width:auto; padding:5px 10px; background:#555" onclick="logout()">Esci</button>
        </div>

        <div class="wallet-card">
            <div class="wallet-info">
                <h5>Guadagno Disponibile</h5>
                <p id="wallet-importo">€ 0.00</p>
            </div>
            <div id="wallet-status"></div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">Annunci<b id="stat-annunci">0 / 0</b></div>
            <div class="stat-item">Click Totali<b id="stat-click">0 / 0</b></div>
            <div class="stat-item">Rimanenti<b id="stat-res">0</b></div>
        </div>

        <div style="background: white; padding: 20px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 25px;">
            <h4 style="margin:0 0 10px 0">Nuovo Annuncio</h4>
            <input type="text" id="amazon-link" placeholder="Incolla link Amazon...">
            <button id="btn-verifica" onclick="verificaEApri()">VERIFICA E PUBBLICA</button>
        </div>

        <h4>I Tuoi Annunci</h4>
        <div id="grid-prodotti" class="grid"></div>
    </div>
</div>

<div id="modal-form" class="modal hidden">
    <div class="modal-box">
        <h3>Dettagli Prodotto</h3>
        <div class="input-group-custom">
            <select id="f-tipo"></select>
            <div class="btn-plus" onclick="apriNuovoOpt('piattaforme')"><i class="fa-solid fa-plus"></i></div>
            <div class="btn-trash" onclick="eliminaOpt('f-tipo')"><i class="fa-solid fa-trash"></i></div>
        </div>
        <div class="input-group-custom">
            <select id="f-categoria"></select>
            <div class="btn-plus" onclick="apriNuovoOpt('categorie')"><i class="fa-solid fa-plus"></i></div>
            <div class="btn-trash" onclick="eliminaOpt('f-categoria')"><i class="fa-solid fa-trash"></i></div>
        </div>
        <input type="text" id="f-titolo" placeholder="Titolo">
        <div style="display:flex; gap:5px">
            <input type="number" id="f-prezzo" placeholder="Prezzo">
            <input type="number" id="f-prezzo-pieno" placeholder="Prezzo Pieno">
        </div>
        <input type="text" id="f-img" placeholder="URL Immagine">
        <input type="text" id="f-link" readonly style="background:#f9f9f9">
        
        <button id="btn-salva" onclick="salvaProdotto()" style="margin-top:10px">PUBBLICA</button>
        <button onclick="chiudiModal('modal-form')" style="background:#eee; color:#333; margin-top:5px">ANNULLA</button>
    </div>
</div>

<div id="modal-premium" class="modal hidden">
    <div class="modal-box premium-box">
        <i class="fa-solid fa-crown"></i>
        <h2>Limite Raggiunto!</h2>
        <p id="premium-msg">Hai raggiunto il massimo degli annunci consentiti per il tuo piano attuale.</p>
        <button class="btn-premium">PASSA A PREMIUM</button>
        <button onclick="chiudiModal('modal-premium')" style="background:none; color:#777; margin-top:10px">Magari più tardi</button>
    </div>
</div>

<div id="modal-input" class="modal hidden">
    <div class="modal-box">
        <h4 id="input-title">Aggiungi</h4>
        <input type="text" id="nuovo-valore-input">
        <button onclick="confermaNuovoOpt()">AGGIUNGI</button>
        <button onclick="chiudiModal('modal-input')" style="background:#eee; color:#333">CHIUDI</button>
    </div>
</div>

<nav class="nav-bottom">
    <a href="#" class="nav-item active"><i class="fa-solid fa-circle-plus"></i><span>Pubblica</span></a>
    <a href="admin-master.html" class="nav-item"><i class="fa-solid fa-chart-simple"></i><span>Admin</span></a>
</nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDRv3qN2qRd2rVKlTB8YDHpyhrDgRiX7vc", authDomain: "shopygo-database.firebaseapp.com", projectId: "shopygo-database" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let user = null;
    let currentAnnunci = 0;
    let tipoOpt = "";

    // 1. Inizializzazione
    async function init() {
        const cod = localStorage.getItem('shopygo_user_session');
        if(!cod) { location.href = 'login.html'; return; }
        
        const q = query(collection(db, "utenti_abilitati"), where("codice", "==", cod));
        const snap = await getDocs(q);
        if(snap.empty) return;
        
        user = snap.docs[0].data();
        document.getElementById('nome-utente').innerText = "Ciao, " + user.nome;
        document.getElementById('id-display').innerText = "ID: " + user.codice;
        document.getElementById('wallet-importo').innerText = "€ " + (user.guadagno_lordo || 0).toFixed(2);
        
        caricaStats();
        caricaConfig();
        caricaProdotti();
    }

    // 2. Carica Statistiche (Annunci e Click)
    async function caricaStats() {
        const q = query(collection(db, "prodotti"), where("tag", "==", user.tag));
        const snap = await getDocs(q);
        currentAnnunci = snap.size;
        
        // Calcolo click totali (somma dei click di ogni prodotto)
        let clickTotali = 0;
        snap.forEach(d => clickTotali += (d.data().click_count || 0));

        document.getElementById('stat-annunci').innerText = `${currentAnnunci} / ${user.limite_annunci || 0}`;
        document.getElementById('stat-click').innerText = `${clickTotali} / ${user.limite_click || 0}`;
        document.getElementById('stat-res').innerText = (user.limite_annunci - currentAnnunci);
    }

    // 3. Controllo Limiti e Verifica Link
    window.verificaEApri = async () => {
        // Controllo Limite Annunci
        if(currentAnnunci >= user.limite_annunci) {
            document.getElementById('premium-msg').innerText = "Hai raggiunto il limite di " + user.limite_annunci + " annunci. Passa a Premium per pubblicare senza limiti!";
            document.getElementById('modal-premium').classList.remove('hidden');
            return;
        }

        const url = document.getElementById('amazon-link').value;
        if(!url) return;

        // Estrazione ASIN e pulizia link
        const asinMatch = url.match(/(?:\/dp\/|\/gp\/product\/)([A-Z0-9]{10})/i);
        if(asinMatch) {
            document.getElementById('f-link').value = `https://www.amazon.it/dp/${asinMatch[1]}?tag=${user.tag}`;
            // Qui andrebbe la fetch LinkPreview...
            document.getElementById('modal-form').classList.remove('hidden');
        } else {
            alert("Link Amazon non valido!");
        }
    };

    // 4. Salvataggio Prodotto
    window.salvaProdotto = async () => {
        const data = {
            titolo: document.getElementById('f-titolo').value,
            prezzo: document.getElementById('f-prezzo').value,
            prezzo_pieno: document.getElementById('f-prezzo-pieno').value,
            immagine: document.getElementById('f-img').value,
            link_amazon: document.getElementById('f-link').value,
            tipo: document.getElementById('f-tipo').value,
            categoria: document.getElementById('f-categoria').value,
            tag: user.tag,
            click_count: 0,
            timestamp: serverTimestamp()
        };
        await addDoc(collection(db, "prodotti"), data);
        location.reload();
    }

    // --- GESTIONE CATEGORIE RIPRISTINATA ---
    window.apriNuovoOpt = (tipo) => {
        tipoOpt = tipo;
        document.getElementById('input-title').innerText = "Aggiungi " + tipo;
        document.getElementById('modal-input').classList.remove('hidden');
    }

    window.confermaNuovoOpt = async () => {
        const val = document.getElementById('nuovo-valore-input').value;
        if(val) {
            await addDoc(collection(db, "app_config"), { nome: val, tipo: tipoOpt });
            caricaConfig();
            chiudiModal('modal-input');
        }
    }

    async function caricaConfig() {
        const snap = await getDocs(collection(db, "app_config"));
        const selTipo = document.getElementById('f-tipo');
        const selCat = document.getElementById('f-categoria');
        selTipo.innerHTML = ""; selCat.innerHTML = "";
        
        snap.forEach(d => {
            const data = d.data();
            const opt = new Option(data.nome, data.nome);
            opt.dataset.id = d.id;
            if(data.tipo === 'piattaforme') selTipo.add(opt);
            else selCat.add(opt);
        });
    }

    window.eliminaOpt = async (selectId) => {
        const sel = document.getElementById(selectId);
        const id = sel.options[sel.selectedIndex]?.dataset.id;
        if(id && confirm("Eliminare questa opzione?")) {
            await deleteDoc(doc(db, "app_config", id));
            caricaConfig();
        }
    }

    window.chiudiModal = (id) => document.getElementById(id).classList.add('hidden');
    
    // Caricamento annunci esistenti
    async function caricaProdotti() {
        const q = query(collection(db, "prodotti"), where("tag", "==", user.tag));
        const snap = await getDocs(q);
        const container = document.getElementById('grid-prodotti');
        container.innerHTML = "";
        snap.forEach(res => {
            const p = res.data();
            const div = document.createElement('div');
            div.className = 'card-p';
            div.innerHTML = `
                <div class="delete-btn" onclick="eliminaAnnuncio('${res.id}')"><i class="fa-solid fa-trash"></i></div>
                <img src="${p.immagine}">
                <p style="font-size:11px; margin-top:5px">€${p.prezzo}</p>
                <small style="font-size:9px; color:var(--amazon)">Clicks: ${p.click_count || 0}</small>
            `;
            container.appendChild(div);
        });
    }

    window.eliminaAnnuncio = async (id) => {
        if(confirm("Eliminare?")) {
            await deleteDoc(doc(db, "prodotti", id));
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
