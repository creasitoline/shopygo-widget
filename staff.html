<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShopyGO - Console Staff</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ffffff; --text: #131921; --amazon: #007185; --bg: #f3f3f3; --accent: #FFD814; --danger: #ff4757; --success: #28a745; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--text); }
        header { background: var(--primary); padding: 5px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; height: 60px; border-bottom: 1px solid #ddd; }
        .logo { height: 30px; }
        #login-section { display: flex; justify-content: center; align-items: center; height: 80vh; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; }
        .main-layout { max-width: 900px; margin: auto; padding: 15px; }
        .user-info-bar { background: white; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid #ddd; }
        .wallet-card { background: linear-gradient(135deg, #007185, #004e5d); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .wallet-info h5 { margin: 0; font-size: 0.7rem; text-transform: uppercase; opacity: 0.8; }
        .wallet-info p { margin: 5px 0 0 0; font-size: 1.6rem; font-weight: bold; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        .status-paid { background: var(--success); color: white; }
        .status-pending { background: var(--accent); color: #131921; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; }
        button { background: var(--amazon); color: white; border: none; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 15px; }
        .card-p { background: white; padding: 8px; border-radius: 12px; text-align: center; border: 1px solid #eee; position: relative; height: 165px; display: flex; flex-direction: column; }
        .card-p img { width: 100%; height: 85px; object-fit: contain; }
        .delete-btn { position: absolute; top: 5px; right: 5px; background: var(--danger); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; z-index: 5; }
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0 25px 0; box-shadow: 0 -2px 15px rgba(0,0,0,0.1); z-index: 2000; border-radius: 20px 20px 0 0; }
        .nav-item { text-decoration: none; color: #555; font-size: 10px; text-align: center; flex: 1; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--amazon); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 3000; padding: 15px; }
        .modal-box { background: white; padding: 25px; border-radius: 25px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
        .hidden { display: none !important; }
        .input-group-custom { display: flex; gap: 5px; align-items: center; }
        .btn-plus, .btn-trash-config { width: 45px; height: 45px; margin: 0; display: flex; align-items: center; justify-content: center; }
        .limit-alert { background: #fff5f5; border: 2px solid var(--danger); padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="ShopyGO" class="logo">
        <span style="font-weight: bold; font-size: 0.8rem; color: var(--amazon);">CONSOLE STAFF</span>
    </header>

    <div id="login-section">
        <div class="login-card">
            <i class="fa-solid fa-user-shield" style="font-size: 3rem; color: var(--amazon); margin-bottom: 15px;"></i>
            <h2>Accesso Staff</h2>
            <input type="text" id="codice-accesso" placeholder="Inserisci il tuo ID (es. SG001)">
            <button id="btn-login">ENTRA</button>
        </div>
    </div>

    <div id="main-container" class="hidden">
        <div class="main-layout">
            <div id="alert-limiti" class="limit-alert hidden">
                <i class="fa-solid fa-triangle-exclamation" style="color:var(--danger)"></i>
                <b id="msg-limite">Limite raggiunto!</b>
            </div>

            <div class="user-info-bar">
                <div>
                    <p id="nome-utente" style="font-weight: bold; margin: 0; font-size: 1.1rem;"></p>
                    <code id="id-display" style="font-size: 11px; color: #777;"></code>
                </div>
                <button onclick="logout()" style="width: auto; background: #555; padding: 8px 12px; font-size: 12px;">Esci</button>
            </div>

            <div class="wallet-card">
                <div class="wallet-info">
                    <h5>Il tuo saldo</h5>
                    <p id="wallet-importo">€ 0.00</p>
                </div>
                <div id="wallet-status"></div>
            </div>

            <div id="upload-box" style="background: white; padding: 20px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 25px;">
                <h4 style="margin: 0 0 10px 0;"><i class="fa-brands fa-amazon"></i> Pubblica Prodotto</h4>
                <input type="text" id="amazon-link" placeholder="Incolla link Amazon qui...">
                <button id="btn-verifica"><i class="fa-solid fa-wand-magic-sparkles"></i> VERIFICA E CARICA</button>
            </div>

            <h4 style="border-bottom: 2px solid var(--amazon); padding-bottom: 5px; display: inline-block;">I Tuoi Annunci</h4>
            <div id="grid-prodotti" class="grid"></div>
        </div>
    </div>

    <div id="modal-form" class="modal hidden">
        <div class="modal-box">
            <h3 id="modal-title">Configura Prodotto</h3>
            <input type="hidden" id="f-id">
            <label style="font-size:11px; font-weight:bold;">Piattaforma</label>
            <div class="input-group-custom"><select id="f-tipo"></select></div>
            <label style="font-size:11px; font-weight:bold;">Categoria</label>
            <div class="input-group-custom"><select id="f-categoria"></select></div>
            <label style="font-size:11px; font-weight:bold;">Stato</label>
            <div class="input-group-custom"><select id="f-stato"></select></div>
            <input type="text" id="f-titolo" placeholder="Titolo">
            <div style="display:flex; gap:10px;">
                <input type="text" id="f-prezzo-pieno" placeholder="Prezzo Pieno">
                <input type="text" id="f-prezzo" placeholder="Prezzo Scontato">
            </div>
            <input type="text" id="f-img" placeholder="URL Immagine">
            <input type="text" id="f-link" placeholder="Link finale" readonly>
            <button id="btn-salva-prodotto">SALVA E PUBBLICA</button>
            <button style="background: #eee; color: #333;" onclick="document.getElementById('modal-form').classList.add('hidden')">CHIUDI</button>
        </div>
    </div>

    <nav class="nav-bottom">
        <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Shop</span></a>
        <a href="#" class="nav-item active"><i class="fa-solid fa-circle-plus"></i><span>Pubblica</span></a>
        <a href="admin-master.html" class="nav-item"><i class="fa-solid fa-chart-simple"></i><span>Admin</span></a>
    </nav>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, updateDoc, getDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDRv3qN2qRd2rVKlTB8YDHpyhrDgRiX7vc", authDomain: "shopygo-database.firebaseapp.com", projectId: "shopygo-database", storageBucket: "shopygo-database.firebasestorage.app", messagingSenderId: "336849306481", appId: "1:336849306481:web:aef142b389ef778ba3ecd0" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const LP_KEY = "3e6cf56ee1f4b99fa9b495166bd732c0";
    
    let utenteAttivo = null;
    let unsubUser = null;

    // LOGIN AUTOMATICO O MANUALE
    const sessione = localStorage.getItem('shopygo_user_session');
    if(sessione) { login(sessione); }

    document.getElementById('btn-login').onclick = () => {
        const cod = document.getElementById('codice-accesso').value.trim();
        if(cod) login(cod);
    };

    async function login(codice) {
        const q = query(collection(db, "utenti_abilitati"), where("codice", "==", codice));
        const snap = await getDocs(q);
        if(!snap.empty) {
            const userDoc = snap.docs[0];
            localStorage.setItem('shopygo_user_session', codice);
            
            // 1. Sincronizzazione Dati Utente (Saldo, Pagato, ecc.)
            if(unsubUser) unsubUser();
            unsubUser = onSnapshot(doc(db, "utenti_abilitati", userDoc.id), (d) => {
                utenteAttivo = d.data();
                aggiornaWallet();
            });

            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-container').classList.remove('hidden');
            
            // 2. Caricamento Prodotti e Config
            caricaProdotti();
            caricaConfigurazioni();
        } else { alert("ID non autorizzato."); }
    }

    function aggiornaWallet() {
        document.getElementById('nome-utente').innerText = "Ciao, " + utenteAttivo.nome;
        document.getElementById('id-display').innerText = "ID Staff: " + utenteAttivo.codice;
        document.getElementById('wallet-importo').innerText = "€ " + (parseFloat(utenteAttivo.guadagno_netto || 0)).toFixed(2);
        
        const statusDiv = document.getElementById('wallet-status');
        statusDiv.innerHTML = utenteAttivo.pagato ? 
            '<span class="status-badge status-paid">Pagato</span>' : 
            '<span class="status-badge status-pending">In Attesa</span>';
    }

    async function caricaProdotti() {
        const container = document.getElementById('grid-prodotti');
        container.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>Caricamento annunci...</p>";
        
        const q = query(collection(db, "prodotti"), where("tag", "==", utenteAttivo.tag));
        const snap = await getDocs(q);
        
        container.innerHTML = "";
        if(snap.empty) container.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>Nessun annuncio pubblicato.</p>";

        snap.forEach((res) => {
            const p = res.data();
            const div = document.createElement('div');
            div.className = 'card-p';
            div.innerHTML = `
                <div class="delete-btn" onclick="eliminaP('${res.id}')"><i class="fa-solid fa-trash"></i></div>
                <img src="${p.immagine}" onclick="apriModificaP('${res.id}')">
                <p style="font-size:10px; font-weight:bold; margin-top:5px;">€ ${p.prezzo}</p>
                <div style="font-size:9px; color:var(--amazon); font-weight:bold;"><i class="fa-solid fa-eye"></i> ${p.click_count || 0}</div>`;
            container.appendChild(div);
        });

        // Controllo Limiti
        const alertBox = document.getElementById('alert-limiti');
        const uploadBox = document.getElementById('upload-box');
        if(utenteAttivo.limite_annunci && snap.size >= utenteAttivo.limite_annunci) {
            alertBox.classList.remove('hidden');
            uploadBox.style.opacity = "0.5";
            uploadBox.style.pointerEvents = "none";
        } else {
            alertBox.classList.add('hidden');
            uploadBox.style.opacity = "1";
            uploadBox.style.pointerEvents = "auto";
        }
    }

    // AMAZON LOGIC
    document.getElementById('btn-verifica').onclick = () => {
        const urlRaw = document.getElementById('amazon-link').value;
        if(!urlRaw) return;
        fetch('https://api.linkpreview.net', { method: 'POST', body: JSON.stringify({key: LP_KEY, q: urlRaw}) })
        .then(r => r.json()).then(res => {
            document.getElementById('f-id').value = ""; 
            document.getElementById('f-titolo').value = res.title || ""; 
            document.getElementById('f-img').value = res.image || "";
            const asinMatch = urlRaw.match(/(?:\/dp\/|\/gp\/product\/)([A-Z0-9]{10})/i);
            document.getElementById('f-link').value = asinMatch ? `https://www.amazon.it/dp/${asinMatch[1]}?tag=${utenteAttivo.tag}` : urlRaw;
            document.getElementById('modal-form').classList.remove('hidden');
        });
    };

    document.getElementById('btn-salva-prodotto').onclick = async () => {
        const idEsistente = document.getElementById('f-id').value;
        const data = {
            titolo: document.getElementById('f-titolo').value, 
            prezzo: document.getElementById('f-prezzo').value,
            prezzo_pieno: document.getElementById('f-prezzo-pieno').value,
            immagine: document.getElementById('f-img').value, 
            link_amazon: document.getElementById('f-link').value, 
            tipo: document.getElementById('f-tipo').value,
            categoria: document.getElementById('f-categoria').value, 
            stato: document.getElementById('f-stato').value,
            tag: utenteAttivo.tag, 
            autore: utenteAttivo.nome, 
            timestamp: serverTimestamp(),
            attivo: true
        };
        if(idEsistente) await updateDoc(doc(db, "prodotti", idEsistente), data);
        else { data.click_count = 0; await addDoc(collection(db, "prodotti"), data); }
        location.reload();
    };

    window.apriModificaP = async (id) => {
        const d = await getDoc(doc(db, "prodotti", id));
        if(d.exists()) {
            const p = d.data();
            document.getElementById('f-id').value = id;
            document.getElementById('f-titolo').value = p.titolo;
            document.getElementById('f-prezzo').value = p.prezzo;
            document.getElementById('f-img').value = p.immagine;
            document.getElementById('f-link').value = p.link_amazon;
            document.getElementById('modal-form').classList.remove('hidden');
        }
    };

    window.eliminaP = async (id) => {
        if(confirm("Eliminare?")) { await deleteDoc(doc(db, "prodotti", id)); caricaProdotti(); }
    };

    async function caricaConfigurazioni() {
        const sel = { 'categorie': 'f-categoria', 'piattaforme': 'f-tipo', 'stato': 'f-stato' };
        const snap = await getDocs(collection(db, "app_config"));
        snap.forEach(d => {
            const data = d.data();
            const opt = document.createElement('option');
            opt.value = data.nome; opt.text = data.nome;
            if(sel[data.tipo]) document.getElementById(sel[data.tipo]).add(opt);
        });
    }

    window.logout = () => { localStorage.removeItem('shopygo_user_session'); location.reload(); };
</script>
</body>
</html>
