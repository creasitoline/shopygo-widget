<script type="module">
    // ... (Tutte le tue import e configurazioni Firebase invariate) ...

    // FUNZIONE AGGIUNTA: Permette di aggiornare i limiti direttamente dalla riga della tabella
    window.updateLimitVeloce = async (id, campo, valore) => {
        try {
            const userRef = doc(db, "utenti_abilitati", id);
            await updateDoc(userRef, { [campo]: parseInt(valore) || 0 });
            console.log("Limite aggiornato nel DB");
        } catch (e) {
            console.error("Errore aggiornamento:", e);
        }
    };

    async function caricaTutto() {
        const snapStaff = await getDocs(collection(db, "utenti_abilitati"));
        const snapProd = await getDocs(query(collection(db, "prodotti"), orderBy("timestamp", "desc")));
        
        const corpoStaff = document.getElementById('tabella-staff');
        corpoStaff.innerHTML = "";
        let lordoTot = 0, costsTot = 0;
        
        snapStaff.forEach(res => {
            const u = res.data();
            const fid = res.id;
            const lordo = parseFloat(u.guadagno_lordo || 0);
            const perc = parseFloat(u.percentuale || 90);
            const saldoStaff = (lordo * perc) / 100;
            lordoTot += lordo; costsTot += saldoStaff;
            
            const riga = document.createElement('tr');
            // MODIFICATA: La colonna "Parametri" ora ha gli input collegati a updateLimitVeloce
            riga.innerHTML = `
                <td onclick="preparaModificaStaff('${fid}', ${JSON.stringify(u).replace(/"/g, '&quot;')})"><b>${u.nome}</b></td>
                <td>
                    <div style="display:flex; flex-direction:column; gap:4px;">
                        <input type="number" value="${u.limite_annunci || 2}" 
                               onchange="updateLimitVeloce('${fid}', 'limite_annunci', this.value)" 
                               title="Limite Annunci" style="width:45px; padding:2px; font-size:10px;">
                        <input type="number" value="${u.limite_click || 50}" 
                               onchange="updateLimitVeloce('${fid}', 'limite_click', this.value)" 
                               title="Limite Click" style="width:45px; padding:2px; font-size:10px;">
                    </div>
                </td>
                <td>€${lordo.toFixed(2)}</td>
                <td><b>€${saldoStaff.toFixed(2)}</b></td>
                <td><div class="action-btns">
                    <button class="btn-pay ${u.pagato ? '' : 'waiting'}" onclick="togglePagamento('${fid}', ${!u.pagato})">${u.pagato ? 'OK' : 'Paga'}</button>
                    <button class="btn-icon btn-trash" onclick="openConfirm('${fid}', 'staff')"><i class="fa-solid fa-trash"></i></button>
                </div></td>`;
            corpoStaff.appendChild(riga);
        });

        // ... (Resto della funzione caricaTutto per i prodotti e stats rimane IDENTICA) ...
        const corpoProd = document.getElementById('tabella-prodotti-admin');
        corpoProd.innerHTML = "";
        snapProd.forEach(res => {
            const p = res.data();
            const idp = res.id;
            const valuta = p.valuta || '€';
            const riga = document.createElement('tr');
            riga.innerHTML = `
                <td><img src="${p.immagine}" class="prod-img" onclick="showImage('${p.immagine}')"></td>
                <td style="max-width: 150px;">
                    <div style="font-weight:bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${p.titolo || 'Senza Titolo'}</div>
                    <small>${valuta} ${p.prezzo} - <b>${p.codice_prodotto || 'SG'}</b></small>
                </td>
                <td><span class="badge-staff">${p.autore || '??'}</span></td>
                <td><div class="action-btns">
                    <button class="btn-icon btn-toggle ${p.attivo === false ? 'off' : ''}" onclick="toggleProdotto('${idp}', ${p.attivo !== false})">
                        <i class="fa-solid ${p.attivo === false ? 'fa-eye-slash' : 'fa-eye'}"></i>
                    </button>
                    <button class="btn-icon btn-trash" onclick="openConfirm('${idp}', 'prod')"><i class="fa-solid fa-trash"></i></button>
                </div></td>`;
            corpoProd.appendChild(riga);
        });

        document.getElementById('stat-utenti').innerText = snapStaff.size;
        document.getElementById('stat-prodotti-count').innerText = snapProd.size;
        document.getElementById('stat-lordo').innerText = "€ " + lordoTot.toFixed(2);
        document.getElementById('stat-staff').innerText = "€ " + costsTot.toFixed(2);
        document.getElementById('stat-utile').innerText = "€ " + (lordoTot - costsTot).toFixed(2);
    }

    // ... (Mantieni salvaUtente, resetForm, togglePagamento IDENTICI al tuo codice originale) ...
</script>
