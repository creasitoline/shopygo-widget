<div class="sidebar">
            <div class="card" id="modulo-user">
                <h3 id="form-title"><i class="fa-solid fa-circle-plus"></i> Gestione Staff</h3>
                <input type="hidden" id="u-firebase-id">
                
                <label>Nome Completo</label>
                <input type="text" id="u-nome" placeholder="Mario Rossi">
                
                <div style="display:flex; gap:10px;">
                    <div style="flex:1"><label>ID</label><input type="text" id="u-id" placeholder="SG001"></div>
                    <div style="flex:1"><label>Tag</label><input type="text" id="u-tag" placeholder="tag-21"></div>
                </div>

                <div style="display:flex; gap:10px; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #eee;">
                    <div style="flex:1">
                        <label>Quota Staff (%)</label>
                        <input type="number" id="u-perc" placeholder="90" value="90" style="margin-bottom:0;">
                    </div>
                    <div style="flex:1">
                        <label>Limite Annunci</label>
                        <input type="number" id="u-limite" placeholder="2" value="2" style="margin-bottom:0;">
                    </div>
                </div>

                <label>Contatti</label>
                <input type="email" id="u-email" placeholder="Email">
                <input type="text" id="u-tel" placeholder="Cellulare">
                
                <label>Pagamento</label>
                <select id="u-metodo">
                    <option value="PayPal">PayPal</option>
                    <option value="Bonifico">Bonifico</option>
                    <option value="Revolut">Revolut</option>
                </select>
                <textarea id="u-conto" rows="2" placeholder="Dati pagamento"></textarea>
                
                <button id="btn-save-main" onclick="salvaUtente()">SALVA COLLABORATORE</button>
                <button id="btn-cancel-edit" class="btn-cancel hidden" onclick="resetForm()">ANNULLA</button>
            </div>
        </div>

        <div class="content">
            <div class="card" style="padding: 10px 0;">
                <h3 style="padding: 0 20px;"><i class="fa-solid fa-list-check"></i> Report Collaboratori</h3>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Staff / ID</th>
                                <th>Lordo</th>
                                <th>% Staff</th>
                                <th>Saldo Staff</th>
                                <th>Azioni</th>
                            </tr>
                        </thead>
                        <tbody id="tabella-staff"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // ... (Configurazione Firebase e login rimangono identici) ...

    async function caricaDati() {
        const snap = await getDocs(collection(db, "utenti_abilitati"));
        const corpo = document.getElementById('tabella-staff');
        corpo.innerHTML = "";
        
        let lordoTot = 0;
        let staffTot = 0;
        let conteggio = 0;

        snap.forEach((res) => {
            const u = res.data();
            const fid = res.id;
            
            const lordo = parseFloat(u.guadagno_lordo || 0);
            const percAssegnata = parseFloat(u.percentuale || 90); // Default 90 se non esiste
            const quotaStaff = (lordo * percAssegnata) / 100;
            const utileMio = lordo - quotaStaff;

            lordoTot += lordo; 
            staffTot += quotaStaff; 
            conteggio++;

            const riga = document.createElement('tr');
            riga.innerHTML = `
                <td data-label="Staff" onclick='preparaModifica("${fid}", ${JSON.stringify(u).replace(/'/g, "&apos;")})'>
                    <div style="text-align:left">
                        <strong>${u.nome}</strong><br>
                        <small>ID: ${u.codice} | Limite: ${u.limite_annunci || 2}</small>
                    </div>
                </td>
                <td data-label="Lordo (€)">
                    <input type="number" step="0.01" value="${lordo}" onchange="aggiornaCifra('${fid}', this.value)" style="width:70px; margin:0; padding:4px; border: 1px solid #ddd; text-align:center;">
                </td>
                <td data-label="% Staff">${percAssegnata}%</td>
                <td data-label="Saldo Staff"><strong>€${quotaStaff.toFixed(2)}</strong></td>
                <td data-label="Azioni">
                    <div style="display:flex; gap:5px; align-items:center; justify-content: flex-end;">
                        <button class="btn-pay ${u.pagato ? '' : 'waiting'}" onclick="togglePagamento('${fid}', ${!u.pagato})">
                            ${u.pagato ? '<i class="fa-solid fa-check"></i>' : 'Paga'}
                        </button>
                        <button class="btn-trash" onclick="elimina('${fid}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </td>
            `;
            corpo.appendChild(riga);
        });

        document.getElementById('stat-utenti').innerText = conteggio;
        document.getElementById('stat-lordo').innerText = "€ " + lordoTot.toFixed(2);
        document.getElementById('stat-staff').innerText = "€ " + staffTot.toFixed(2);
        document.getElementById('stat-netto').innerText = "€ " + (lordoTot - staffTot).toFixed(2);
    }

    window.salvaUtente = async function() {
        const fid = document.getElementById('u-firebase-id').value;
        const dati = {
            nome: document.getElementById('u-nome').value,
            codice: document.getElementById('u-id').value,
            tag: document.getElementById('u-tag').value,
            percentuale: parseFloat(document.getElementById('u-perc').value) || 90,
            limite_annunci: parseInt(document.getElementById('u-limite').value) || 2,
            email: document.getElementById('u-email').value,
            tel: document.getElementById('u-tel').value,
            metodo: document.getElementById('u-metodo').value,
            conto: document.getElementById('u-conto').value
        };

        if(!dati.nome || !dati.codice) return alert("Inserisci Nome e ID");

        try {
            if(fid) {
                await updateDoc(doc(db, "utenti_abilitati", fid), dati);
            } else {
                dati.guadagno_lordo = 0;
                dati.pagato = false;
                await addDoc(collection(db, "utenti_abilitati"), dati);
            }
            resetForm();
            caricaDati();
        } catch (e) { alert("Errore nel salvataggio"); }
    }

    window.preparaModifica = function(fid, u) {
        document.getElementById('u-firebase-id').value = fid;
        document.getElementById('u-nome').value = u.nome;
        document.getElementById('u-id').value = u.codice;
        document.getElementById('u-tag').value = u.tag;
        document.getElementById('u-perc').value = u.percentuale || 90;
        document.getElementById('u-limite').value = u.limite_annunci || 2;
        document.getElementById('u-email').value = u.email || "";
        document.getElementById('u-tel').value = u.tel || "";
        document.getElementById('u-metodo').value = u.metodo || "PayPal";
        document.getElementById('u-conto').value = u.conto || "";
        
        document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-user-pen"></i> Modifica Staff';
        document.getElementById('btn-cancel-edit').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ... (Le altre funzioni resetForm, aggiornaCifra, togglePagamento, elimina restano uguali) ...
</script>
